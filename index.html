<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="x-ua-compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Forex Canvas (Elegant Digital-7 Split)</title>

<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">

<style>
  :root {
    --bg-main:      #000432; /* Uniform deep blue background */
    --txt-main:     #ffffff; /* Pure white text */
    --line:         #ffffff; /* White color for 1px borders */
    --font:         'Digital-7 Mono', 'Courier New', monospace; 
  }

  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%; 
    width: 100%;
    margin: 0;
    padding: 0;
    background: var(--bg-main);
  }

  body {
    font-family: var(--font);
    display: flex;
    flex-direction: row; 
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    /* 1px white border around the entire outer edge */
    border: 1px solid var(--line); 
  }

  /* ── FULLSCREEN BUTTON ── */
  #fs-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    cursor: pointer;
    font-family: 'Courier New', monospace; 
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.4); /* Dimmed so it's not distracting */
    transition: opacity 0.3s, color 0.3s;
  }

  #fs-btn:hover {
    color: rgba(255, 255, 255, 1);
  }

  /* Hides the button when fullscreen is active */
  .hidden {
    display: none !important;
  }

  /* ── LEFT PANEL (TEXT) ── */
  .info-panel {
    flex: 1; 
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6vh; /* Increased gap for elegant breathing room */
    padding: 20px;
    /* 1px white splitting line down the middle */
    border-right: 1px solid var(--line); 
  }

  /* ── RIGHT PANEL (CANVAS) ── */
  .canvas-panel {
    flex: 1; 
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── EXACT TYPOGRAPHY STYLING (Matching Screenshot Proportions) ── */
  .info-panel div {
    color: var(--txt-main); /* All text is pure white */
    font-style: italic; /* Crucial: Slanted digital hardware look */
    letter-spacing: 2px;
    line-height: 1;
  }

  #live-clock {
    font-size: clamp(4rem, 9vw, 10rem);
  }

  #live-date {
    font-size: clamp(2.5rem, 6vw, 6.5rem);
  }

  #live-day {
    font-size: clamp(2rem, 4.5vw, 5rem);
    text-transform: uppercase;
  }

  #live-session-name {
    font-size: clamp(2.5rem, 6vw, 6.5rem);
  }

  /* Hidden to keep the interface purely minimalist like the screenshot */
  #live-time-range {
    display: none; 
  }

  /* Responsive stack for mobile (Portrait mode) */
  @media (max-aspect-ratio: 3/4) {
    body {
      flex-direction: column;
    }
    .info-panel { 
      border-right: none; 
      border-bottom: 1px solid var(--line); 
    }
  }
</style>
</head>
<body>

<div id="fs-btn">[ FULLSCREEN ]</div>

<div class="info-panel" id="card">
  <div id="live-clock">--:--:--</div>
  <div id="live-date">--:--:----</div>
  <div id="live-day">---</div>
  <div id="live-session-name">LOADING...</div>
  <div id="live-time-range"></div> </div>

<div class="canvas-panel" id="canvas-container">
  <canvas id="matrix-canvas"></canvas>
</div>

<script>
// ── FULLSCREEN LOGIC ──
const fsBtn = document.getElementById('fs-btn');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log(`Error attempting to enable fullscreen: ${err.message}`);
    });
  }
});

document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    fsBtn.classList.add('hidden'); // Hide when in fullscreen
  } else {
    fsBtn.classList.remove('hidden'); // Show when exiting fullscreen
  }
});

// ── FOREX CANVAS LOGIC ──
const SYMBOL = 'frxEURUSD';
const WS_URL = 'wss://ws.derivws.com/websockets/v3?app_id=1089';

// Removed spaces around the '+' to match your image exactly
const C = {
  syd: '#1e3a8a', tok: '#065f46', syd_tok: '#0e7490', lon: '#991b1b', 
  tok_lon: '#854d0e', ny: '#5b21b6', lon_ny: '#be123c', early: '#1e293b', 
  off: '#0f172a', wknd: '#1a0505'  
};

function getCoreDay() {
  return [
    { n: 'NEW YORK LATE',    h: 2.5, c: C.ny,      time: '12:00 AM - 02:30 AM' },
    { n: 'OFFLINE',          h: 2.0, c: C.off,     time: '02:30 AM - 04:30 AM' },
    { n: 'SYDNEY',           h: 1.0, c: C.syd,     time: '04:30 AM - 05:30 AM' },
    { n: 'SYDNEY+TOKYO',     h: 7.0, c: C.syd_tok, time: '05:30 AM - 12:30 PM' },
    { n: 'TOKYO',            h: 1.0, c: C.tok,     time: '12:30 PM - 01:30 PM' },
    { n: 'TOKYO+LONDON',     h: 1.0, c: C.tok_lon, time: '01:30 PM - 02:30 PM' },
    { n: 'LONDON',           h: 4.0, c: C.lon,     time: '02:30 PM - 06:30 PM' },
    { n: 'LONDON+NEW YORK',  h: 4.0, c: C.lon_ny,  time: '06:30 PM - 10:30 PM' },
    { n: 'NEW YORK',         h: 1.5, c: C.ny,      time: '10:30 PM - 12:00 AM' }
  ];
}

const monDay = getCoreDay();
monDay[0] = { n: 'WEEKEND',      h: 2.5, c: C.wknd,  time: '12:00 AM - 02:30 AM' };
monDay[1] = { n: 'EARLY VOLUME', h: 2.0, c: C.early, time: '02:30 AM - 04:30 AM' };

const week = [
  { name: 'MONDAY',    segments: monDay },
  { name: 'TUESDAY',   segments: getCoreDay() },
  { name: 'WEDNESDAY', segments: getCoreDay() },
  { name: 'THURSDAY',  segments: getCoreDay() },
  { name: 'FRIDAY',    segments: getCoreDay() },
  { name: 'SATURDAY',  segments: [{ n: 'NEW YORK LATE', h: 2.5, c: C.ny, time: '12:00 AM - 02:30 AM' }, { n: 'WEEKEND', h: 21.5, c: C.wknd, time: '02:30 AM - 12:00 AM' }] },
  { name: 'SUNDAY',    segments: [{ n: 'WEEKEND', h: 24.0, c: C.wknd, time: '12:00 AM - 12:00 AM' }] }
];

function getWeekStartEpochUTC() {
  const now = new Date();
  const utcNow = now.getTime();
  const istNow = utcNow + (5.5 * 3600 * 1000);
  const dIst = new Date(istNow);
  let day = dIst.getUTCDay();
  let diff = day === 0 ? 6 : day - 1;
  let elapsedMs = (diff * 86400000) + (dIst.getUTCHours() * 3600000) + (dIst.getUTCMinutes() * 60000) + (dIst.getUTCSeconds() * 1000) + dIst.getUTCMilliseconds();
  let monIstMs = istNow - elapsedMs;
  return Math.floor((monIstMs - (5.5 * 3600 * 1000)) / 1000);
}

const weekStartEpoch = getWeekStartEpochUTC();
const flatSegments = [];
let accumulatedSecs = 0;

const setupNow = new Date();
const istSetupNow = new Date(setupNow.getTime() + (setupNow.getTimezoneOffset() * 60000) + (5.5 * 3600000));
let currentDayOffset = istSetupNow.getDay();
let diffToMonOffset = currentDayOffset === 0 ? 6 : currentDayOffset - 1;
const monDate = new Date(istSetupNow);
monDate.setDate(istSetupNow.getDate() - diffToMonOffset);

week.forEach((day, dIdx) => {
  const rowDate = new Date(monDate);
  rowDate.setDate(monDate.getDate() + dIdx);
  const dd = String(rowDate.getDate()).padStart(2, '0');
  const mm = String(rowDate.getMonth() + 1).padStart(2, '0');
  const yyyy = rowDate.getFullYear();
  
  day.segments.forEach(seg => {
    const durSecs = seg.h * 3600;
    flatSegments.push({
      ...seg,
      dayName: day.name,
      dateStr: `${dd}-${mm}-${yyyy}`, // Dashes as requested
      startS: accumulatedSecs,
      endS: accumulatedSecs + durSecs,
      durS: durSecs
    });
    accumulatedSecs += durSecs;
  });
});

const elClock   = document.getElementById('live-clock');
const elDate    = document.getElementById('live-date');
const elDay     = document.getElementById('live-day');
const elName    = document.getElementById('live-session-name');
const canvasContainer = document.getElementById('canvas-container');
const canvas    = document.getElementById('matrix-canvas');
const ctx       = canvas.getContext('2d', { alpha: false }); 

let currentActiveIndex = -1;
let prevPrice = null;
let histPrevPrice = null;
let ws = null;

let gridCols = 0;
let spaceX = 0;
let spaceY = 0;
let dotRadius = 1;

function updateClockAndCheckSession() {
  const tNow = new Date();
  const istTNow = new Date(tNow.getTime() + (tNow.getTimezoneOffset() * 60000) + (5.5 * 3600000));
  
  const hh = String(istTNow.getHours()).padStart(2, '0');
  const mm = String(istTNow.getMinutes()).padStart(2, '0');
  const ss = String(istTNow.getSeconds()).padStart(2, '0');
  elClock.innerText = `${hh}:${mm}:${ss}`;

  const currentEpoch = Math.floor(Date.now() / 1000);
  const weekSecs = currentEpoch - weekStartEpoch;

  let activeIdx = flatSegments.findIndex(s => weekSecs >= s.startS && weekSecs < s.endS);
  if (activeIdx === -1) activeIdx = 47; 

  if (activeIdx !== currentActiveIndex) {
    currentActiveIndex = activeIdx;
    const seg = flatSegments[activeIdx];

    elDate.innerText = seg.dateStr;
    elDay.innerText  = seg.dayName;
    elName.innerText = seg.n;

    const cWidth = canvasContainer.clientWidth;
    const cHeight = canvasContainer.clientHeight;
    
    const aspectRatio = cWidth / cHeight;
    const optimalRows = Math.ceil(Math.sqrt(seg.durS / aspectRatio));
    gridCols = Math.ceil(optimalRows * aspectRatio);

    canvas.width  = cWidth;
    canvas.height = cHeight;

    spaceX = canvas.width / gridCols;
    spaceY = canvas.height / optimalRows;
    dotRadius = Math.max(Math.min(spaceX, spaceY) * 0.35, 1.5);

    // Deep blue background for canvas
    ctx.fillStyle = '#000432';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Pre-Draw all unlit LEDs exactly matching the screenshot's empty grid
    const totalDotsToFillScreen = gridCols * optimalRows;

    ctx.fillStyle = '#333333'; // Solid dark grey for unlit LEDs
    ctx.beginPath();
    for (let i = 0; i < totalDotsToFillScreen; i++) {
      const x = (i % gridCols) * spaceX + (spaceX / 2);
      const y = Math.floor(i / gridCols) * spaceY + (spaceY / 2);
      ctx.moveTo(x, y);
      ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
    }
    ctx.fill();

    subscribeToSession(seg);
  }
}

function drawDot(index, price, pPrice) {
    let color = '#555555'; // Slightly lighter grey for "no change" ticks
    if (pPrice !== null) {
        if (price > pPrice) color = '#1cc658'; // Green
        else if (price < pPrice) color = '#ff3333'; // Red
    }

    const x = (index % gridCols) * spaceX + (spaceX / 2);
    const y = Math.floor(index / gridCols) * spaceY + (spaceY / 2);

    ctx.beginPath();
    ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
}

function subscribeToSession(seg) {
  if (ws) {
    ws.onclose = null; 
    ws.close();
  }

  ws = new WebSocket(WS_URL);

  const absoluteStartEpoch = weekStartEpoch + seg.startS;
  const absoluteEndEpoch = weekStartEpoch + seg.endS;
  
  let currentFetchEnd = 'latest'; 
  histPrevPrice = null; 
  prevPrice = null;

  ws.onopen = () => {
    ws.send(JSON.stringify({ ticks: SYMBOL, subscribe: 1 }));
    fetchHistoryChunk();
  };

  function fetchHistoryChunk() {
    ws.send(JSON.stringify({
      ticks_history: SYMBOL,
      end: currentFetchEnd,
      count: 5000, 
      style: 'ticks'
    }));
  }

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    
    if (msg.msg_type === 'history' && msg.history) {
      const times = msg.history.times;
      const prices = msg.history.prices;
      
      if (prices.length > 0) {
        if (histPrevPrice === null) histPrevPrice = prices[0];
        
        for (let i = 0; i < prices.length; i++) {
          const epoch = times[i];
          const price = prices[i];
          
          if (epoch < absoluteStartEpoch || epoch >= absoluteEndEpoch) continue;

          const weekSecs = epoch - weekStartEpoch;
          const secOffset = weekSecs - seg.startS;

          drawDot(secOffset, price, histPrevPrice);
          histPrevPrice = price;
        }

        if (currentFetchEnd === 'latest') {
             prevPrice = prices[prices.length - 1]; 
        }

        if (times.length > 1 && times[0] > absoluteStartEpoch) {
          currentFetchEnd = times[0]; 
          fetchHistoryChunk(); 
        }
      }
    }
    
    if (msg.msg_type === 'tick' && msg.tick) {
      const livePrice = msg.tick.quote;
      const tickEpoch = msg.tick.epoch;
      
      if (!prevPrice) prevPrice = livePrice;

      const weekSecs = tickEpoch - weekStartEpoch;
      const secOffset = weekSecs - seg.startS;

      if (secOffset >= 0 && secOffset < seg.durS) {
        drawDot(secOffset, livePrice, prevPrice);
      }
      prevPrice = livePrice;
    }
  };

  ws.onclose = () => {
    setTimeout(() => {
      if (flatSegments[currentActiveIndex] === seg) {
        subscribeToSession(seg);
      }
    }, 3000);
  };
}

let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    currentActiveIndex = -1; 
    updateClockAndCheckSession();
  }, 500); 
});

setInterval(updateClockAndCheckSession, 1000);
updateClockAndCheckSession(); 
</script>
</body>
</html>
