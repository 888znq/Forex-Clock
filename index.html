<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Session & Volatility Clock</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Chakra+Petch:wght@600;700&display=swap');

        :root {
            /* Dynamic variables controlled by JS */
            --bg-color: #111111; /* Unified color for body and clock face */
            --element-color: #ffffff; /* Elements are crisp white against the dark backgrounds */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Entire screen background syncs with the market */
            background-color: var(--bg-color); 
            overflow: hidden;
            font-family: 'Chakra Petch', sans-serif;
            transition: background-color 0.5s ease;
        }

        /* --- Main Clock Bezel and Face --- */
        .clock {
            width: 85vmin; 
            height: 85vmin;
            border-radius: 50%;
            /* Clock face syncs perfectly with outer background */
            background-color: var(--bg-color); 
            position: relative;
            
            /* Bright white ring to separate the face from the background */
            border: 2.5vmin solid var(--element-color); 
            
            /* Deep inner and outer shadows for 3D depth */
            box-shadow: 0 4vmin 8vmin rgba(0,0,0,0.8), inset 0 0 6vmin rgba(0,0,0,0.4);
            transition: background-color 0.5s ease, border-color 0.5s ease; 
        }

        /* --- Session Name Text --- */
        .brand-text {
            position: absolute;
            top: 28%; /* Placed exactly in the upper void below the 12 */
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Audiowide', sans-serif;
            font-weight: 700;
            font-size: 3.5vmin; /* Perfect size to prevent side overlap */
            letter-spacing: 0.2vmin;
            color: var(--element-color); 
            background: transparent;
            z-index: 2;
            text-align: center;
            white-space: nowrap;
            transition: color 0.5s ease;
            text-shadow: 0 1vmin 2vmin rgba(0,0,0,0.5); 
        }

        /* --- Movement Text --- */
        .movement-display {
            position: absolute;
            bottom: 28%; /* Mirrored position to balance the session text */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 3.5vmin; /* Matched size to session text */
            font-weight: 700;
            letter-spacing: 0.1vmin;
            color: var(--element-color);
            background: transparent;
            transition: color 0.5s ease;
            text-shadow: 0 1vmin 2vmin rgba(0,0,0,0.5);
        }

        /* --- Minute and Hour Markers --- */
        .marker-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
        }

        .tick-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0.4vmin;
            height: 1.6vmin;
            background-color: var(--element-color);
            transition: background-color 0.5s ease;
        }

        .triangle-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2.2vmin;
            height: 2vmin;
            background-color: var(--element-color);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transition: background-color 0.5s ease;
        }

        /* --- Clock Numbers --- */
        .number {
            position: absolute;
            transform: translate(-50%, -50%);
            font-family: 'Audiowide', sans-serif;
            font-weight: 700;
            font-size: 10.5vmin; 
            color: var(--element-color);
            line-height: 1;
            z-index: 4; 
            transition: color 0.5s ease;
            text-shadow: 0 0.5vmin 1vmin rgba(0,0,0,0.2);
        }

        /* --- Hands Configuration --- */
        .hand-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Hour Hand */
        .hour-hand {
            position: absolute;
            left: 50%;
            bottom: 50%; 
            transform: translateX(-50%);
            height: 25%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hour-hand .arrow {
            width: 0; height: 0;
            border-left: 1.6vmin solid transparent;
            border-right: 1.6vmin solid transparent;
            border-bottom: 3.5vmin solid var(--element-color);
            transition: border-bottom-color 0.5s ease;
        }
        .hour-hand .shaft {
            width: 1.5vmin;
            height: calc(100% - 3.5vmin);
            background-color: var(--element-color);
            transition: background-color 0.5s ease;
        }
        .hour-tail {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%);
            width: 2.3vmin;
            height: 3.5vmin;
            background-color: var(--element-color);
            transition: background-color 0.5s ease;
        }

        /* Minute Hand */
        .minute-hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
            height: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .minute-hand .arrow {
            width: 0; height: 0;
            border-left: 1.4vmin solid transparent;
            border-right: 1.4vmin solid transparent;
            border-bottom: 3.8vmin solid var(--element-color);
            transition: border-bottom-color 0.5s ease;
        }
        .minute-hand .shaft {
            width: 1.3vmin;
            height: calc(100% - 3.8vmin);
            background-color: var(--element-color);
            transition: background-color 0.5s ease;
        }
        .minute-tail {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%);
            width: 2vmin;
            height: 3.5vmin;
            background-color: var(--element-color);
            transition: background-color 0.5s ease;
        }

        /* Second Hand */
        .second-hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
            width: 0.35vmin;
            height: 44%;
            background-color: var(--element-color); 
            transition: background-color 0.5s ease;
        }
        .second-tail {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%);
            width: 0.35vmin;
            height: 12%;
            background-color: var(--element-color); 
            transition: background-color 0.5s ease;
        }

        /* --- Center Pivot Dot --- */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4vmin;
            height: 4vmin;
            background-color: var(--element-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
            box-shadow: 0 0 1vmin rgba(0,0,0,0.5);
        }
        .center-dot::after {
            content: '';
            width: 1.4vmin;
            height: 1.4vmin;
            background-color: var(--bg-color); /* Inner dot syncs with background */
            border-radius: 50%;
            transition: background-color 0.5s ease;
        }

    </style>
</head>
<body>

    <div class="clock" id="clock-face">
        <div class="brand-text" id="session-name">SYNCING...</div>
        <div class="movement-display" id="session-movement">
            <span style="opacity:0.4; font-size: 3.5vmin;">WAITING</span>
        </div>
        <div class="hand-wrapper" id="hour-wrapper">
            <div class="hour-hand"><div class="arrow"></div><div class="shaft"></div></div>
            <div class="hour-tail"></div>
        </div>
        <div class="hand-wrapper" id="minute-wrapper">
            <div class="minute-hand"><div class="arrow"></div><div class="shaft"></div></div>
            <div class="minute-tail"></div>
        </div>
        <div class="hand-wrapper" id="second-wrapper">
            <div class="second-hand"></div>
            <div class="second-tail"></div>
        </div>
        <div class="center-dot"></div>
    </div>

    <script>
        // --- 1. CLOCK UI GENERATION ---
        const clockFace = document.getElementById('clock-face');

        for (let i = 0; i < 60; i++) {
            const markerContainer = document.createElement('div');
            markerContainer.className = 'marker-container';
            markerContainer.style.transform = `rotate(${i * 6}deg)`; 

            const marker = document.createElement('div');
            if (i % 5 === 0) { marker.className = 'triangle-marker'; } 
            else { marker.className = 'tick-marker'; }

            markerContainer.appendChild(marker);
            clockFace.prepend(markerContainer); 
        }
        
        const radius = 40; 
        for (let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.className = 'number';
            num.innerText = i;
            
            const angle = (i * 30 - 90) * (Math.PI / 180);
            const x = 50 + radius * Math.cos(angle);
            const y = 50 + radius * Math.sin(angle);
            
            num.style.left = `${x}%`;
            num.style.top = `${y}%`;
            
            clockFace.appendChild(num);
        }

        // --- 2. FOREX LOGIC & VERIFIED API INTEGRATION ---
        const API_TOKEN = 'TpVIBWpqet5X8AH';
        const APP_ID    = '1089';
        const WS_URL    = `wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`;
        const SYMBOL    = 'frxEURUSD';

        // Session list strictly for time & naming
        const ROWS = [
          { id:'ny_offline',name:'NY OFFLINE',         istO: 0,         istC: 4 + 30/60 }, 
          { id:'sydney',    name:'SYDNEY',             istO: 4 + 30/60, istC: 5.5       }, 
          { id:'sydtok',    name:'SYDNEY — TOKYO',     istO: 5.5,       istC: 12.5      }, 
          { id:'tokyo',     name:'TOKYO',              istO: 12.5,      istC: 13.5      }, 
          { id:'toklon',    name:'TOKYO — LONDON',     istO: 13.5,      istC: 14.5      }, 
          { id:'london',    name:'LONDON',             istO: 14.5,      istC: 18.5      }, 
          { id:'lonny',     name:'LONDON — NEW YORK',  istO: 18.5,      istC: 22.5      }, 
          { id:'ny_early',  name:'NEW YORK',           istO: 22.5,      istC: 24        }  
        ];

        let serverTimeOffset = 0; 
        let sessionStats = {}; 
        let activeSessionId = null;

        function getIST() {
            const serverNow = new Date(Date.now() + serverTimeOffset);
            return new Date(serverNow.getTime() + serverNow.getTimezoneOffset() * 60000 + 5.5 * 3600000);
        }

        function istFrac(ist) { 
            return ist.getHours() + ist.getMinutes() / 60 + ist.getSeconds() / 3600; 
        }

        function getTodayMidnightEpochUTC() {
            const istNow = getIST();
            const istMidnight = new Date(istNow);
            istMidnight.setHours(0, 0, 0, 0); 
            return Math.floor((istMidnight.getTime() - (5.5 * 3600 * 1000)) / 1000);
        }

        // --- 3. CLOCK TICKING & UI UPDATES ---
        const hourWrapper = document.getElementById('hour-wrapper');
        const minuteWrapper = document.getElementById('minute-wrapper');
        const secondWrapper = document.getElementById('second-wrapper');
        const sessionNameEl = document.getElementById('session-name');
        const movementEl = document.getElementById('session-movement');

        function updateClockAndSession() {
            const ist = getIST();
            
            // Analog Hand Movement
            const seconds = ist.getSeconds();
            const minutes = ist.getMinutes();
            const hours = ist.getHours();

            const secondsDegrees = (seconds / 60) * 360;
            const minutesDegrees = ((minutes + seconds / 60) / 60) * 360;
            const hoursDegrees = ((hours % 12 + minutes / 60) / 12) * 360;

            secondWrapper.style.transform = `rotate(${secondsDegrees}deg)`;
            minuteWrapper.style.transform = `rotate(${minutesDegrees}deg)`;
            hourWrapper.style.transform = `rotate(${hoursDegrees}deg)`;

            // Time Logic
            const frac24 = istFrac(ist);
            const dayOfWeek = ist.getDay(); 

            let isWeekend = false;
            if (dayOfWeek === 6 && frac24 >= (2 + 25/60)) isWeekend = true; 
            if (dayOfWeek === 0) isWeekend = true; 
            if (dayOfWeek === 1 && frac24 < (4 + 30/60)) isWeekend = true; 

            if (isWeekend) {
                document.documentElement.style.setProperty('--bg-color', '#1a0000'); 
                document.documentElement.style.setProperty('--element-color', '#ffffff'); 
                sessionNameEl.innerText = "OFFLINE";
                movementEl.innerHTML = `<span>WEEKEND CLOSED</span>`;
                return; 
            }

            let currentSession = null;
            ROWS.forEach(row => {
                let currentIstC = row.istC;
                if (row.id === 'ny_offline' && dayOfWeek === 6) { currentIstC = 2 + 25/60; }
                if (frac24 >= row.istO && frac24 < currentIstC) { currentSession = row; }
            });

            if (currentSession) {
                activeSessionId = currentSession.id;
                
                // Update Session Name Text
                sessionNameEl.innerText = currentSession.name;

                // --- UNIFIED DEEP RED/GREEN LOGIC ---
                if (sessionStats[activeSessionId] && sessionStats[activeSessionId].open) {
                    let open = sessionStats[activeSessionId].open;
                    let close = sessionStats[activeSessionId].close;
                    let diff = (close - open) * 10000; 
                    
                    let symbol = '▬';
                    let sign = '';
                    let bgColor = '#111111'; // Default flat dark 
                    
                    if (diff > 0) {
                        symbol = '▲';
                        sign = '+';
                        bgColor = '#043317'; // Deepest Forest Green
                    } else if (diff < 0) {
                        symbol = '▼';
                        bgColor = '#380505'; // Deepest Crimson/Burgundy Red
                    }

                    // Apply the unified background color (clock face AND body)
                    document.documentElement.style.setProperty('--bg-color', bgColor);
                    document.documentElement.style.setProperty('--element-color', '#ffffff');

                    movementEl.innerHTML = `
                        <span>
                            ${sign}${diff.toFixed(1)} <span style="font-size:0.7em">${symbol}</span>
                        </span>`;
                } else {
                    document.documentElement.style.setProperty('--bg-color', '#111111');
                    document.documentElement.style.setProperty('--element-color', '#ffffff');
                    movementEl.innerHTML = `<span style="opacity:0.4; font-size: 3.5vmin;">WAITING</span>`;
                }
            }
        }

        // --- 4. WEBSOCKET CONNECTION (MATCHES PYTHON SCRIPT) ---
        let ws = null;
        let reconnectTimer = null;

        function connect() {
            if (ws) { ws.close(); ws = null; }
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => { 
                ws.send(JSON.stringify({ authorize: API_TOKEN })); 
            };
            
            ws.onmessage = (evt) => {
                const msg = JSON.parse(evt.data);
                
                if (msg.error) {
                    console.error("Deriv API Error: ", msg.error.message);
                    return;
                }

                if (msg.msg_type === 'authorize') {
                    ws.send(JSON.stringify({ time: 1 }));
                    ws.send(JSON.stringify({ ticks: SYMBOL, subscribe: 1 }));
                    ws.send(JSON.stringify({
                        ticks_history: SYMBOL, end: "latest", count: 1440, style: "candles", granularity: 60
                    }));
                }

                if (msg.msg_type === 'time') {
                    serverTimeOffset = (msg.time * 1000) - Date.now();
                    setTimeout(() => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ time: 1 })); }, 300000);
                }
                
                if (msg.msg_type === 'candles' && msg.candles) {
                    const epochMidnightUTC = getTodayMidnightEpochUTC();
                    
                    ROWS.forEach(row => {
                        let sEpoch = epochMidnightUTC + Math.round(row.istO * 3600);
                        let eEpoch = epochMidnightUTC + Math.round(row.istC * 3600);
                        
                        let rowCandles = msg.candles.filter(c => c.epoch >= sEpoch && c.epoch < eEpoch);
                        if (rowCandles.length > 0) {
                            sessionStats[row.id] = { 
                                open: rowCandles[0].open, 
                                close: rowCandles[rowCandles.length-1].close 
                            };
                        }
                    });
                }
                
                if (msg.msg_type === 'tick' && msg.tick) {
                    serverTimeOffset = (msg.tick.epoch * 1000) - Date.now();
                    
                    let currentPrice = msg.tick.quote;
                    let tickEpoch = msg.tick.epoch;
                    const epochMidnightUTC = getTodayMidnightEpochUTC();
                    
                    ROWS.forEach(row => {
                        let sEpoch = epochMidnightUTC + Math.round(row.istO * 3600);
                        let eEpoch = epochMidnightUTC + Math.round(row.istC * 3600);
                        
                        if (tickEpoch >= sEpoch && tickEpoch < eEpoch) {
                            if (!sessionStats[row.id]) {
                                sessionStats[row.id] = { open: currentPrice, close: currentPrice };
                            } else {
                                sessionStats[row.id].close = currentPrice;
                            }
                        }
                    });
                }
            };
            
            ws.onclose = () => { 
                ws = null; 
                clearTimeout(reconnectTimer); 
                reconnectTimer = setTimeout(connect, 4000); 
            };
        }

        updateClockAndSession();
        setInterval(updateClockAndSession, 1000);
        connect();
    </script>
</body>
</html>
