<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Chakra+Petch:wght@600;700&display=swap');

        :root {
            --bg-color: #111111;
            --element-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Chakra Petch', sans-serif;
        }

        /* --- Main Clock Bezel and Face --- */
        .clock {
            width: 85vmin; 
            height: 85vmin;
            border-radius: 50%;
            background-color: var(--bg-color); 
            position: relative;
            border: 2.5vmin solid var(--element-color); 
            box-shadow: 0 4vmin 8vmin rgba(0,0,0,0.8), inset 0 0 6vmin rgba(0,0,0,0.4);
        }

        /* --- Minute and Hour Markers --- */
        .marker-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
        }

        .tick-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0.4vmin;
            height: 1.6vmin;
            background-color: var(--element-color);
        }

        .triangle-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2.2vmin;
            height: 2vmin;
            background-color: var(--element-color);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }

        /* --- Clock Numbers --- */
        .number {
            position: absolute;
            transform: translate(-50%, -50%);
            font-family: 'Audiowide', sans-serif;
            font-weight: 700;
            font-size: 10.5vmin; 
            color: var(--element-color);
            line-height: 1;
            z-index: 4; 
            text-shadow: 0 0.5vmin 1vmin rgba(0,0,0,0.2);
        }

        /* --- Hands Configuration --- */
        .hand-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Hour Hand */
        .hour-hand {
            position: absolute;
            left: 50%;
            bottom: 50%; 
            transform: translateX(-50%);
            height: 25%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hour-hand .arrow {
            width: 0; height: 0;
            border-left: 1.6vmin solid transparent;
            border-right: 1.6vmin solid transparent;
            border-bottom: 3.5vmin solid var(--element-color);
        }
        .hour-hand .shaft {
            width: 1.5vmin;
            height: calc(100% - 3.5vmin);
            background-color: var(--element-color);
        }
        .hour-tail {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%);
            width: 2.3vmin;
            height: 3.5vmin;
            background-color: var(--element-color);
        }

        /* Minute Hand */
        .minute-hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
            height: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .minute-hand .arrow {
            width: 0; height: 0;
            border-left: 1.4vmin solid transparent;
            border-right: 1.4vmin solid transparent;
            border-bottom: 3.8vmin solid var(--element-color);
        }
        .minute-hand .shaft {
            width: 1.3vmin;
            height: calc(100% - 3.8vmin);
            background-color: var(--element-color);
        }
        .minute-tail {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%);
            width: 2vmin;
            height: 3.5vmin;
            background-color: var(--element-color);
        }

        /* Second Hand */
        .second-hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
            width: 0.35vmin;
            height: 44%;
            background-color: var(--element-color); 
        }
        .second-tail {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%);
            width: 0.35vmin;
            height: 12%;
            background-color: var(--element-color); 
        }

        /* --- Center Pivot Dot --- */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4vmin;
            height: 4vmin;
            background-color: var(--element-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 1vmin rgba(0,0,0,0.5);
        }
        .center-dot::after {
            content: '';
            width: 1.4vmin;
            height: 1.4vmin;
            background-color: var(--bg-color);
            border-radius: 50%;
        }

        /* --- Fullscreen Button --- */
        #fullscreen-btn {
            position: absolute;
            top: 3vmin;
            right: 3vmin;
            background: transparent;
            color: var(--element-color);
            border: 0.3vmin solid var(--element-color);
            border-radius: 1vmin;
            padding: 1vmin 2vmin;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 2.5vmin;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: 0 0.5vmin 1vmin rgba(0,0,0,0.3);
        }

        #fullscreen-btn:hover {
            background: var(--element-color);
            color: var(--bg-color);
        }

        .hidden {
            display: none !important;
        }

    </style>
</head>
<body>

    <button id="fullscreen-btn">FULLSCREEN</button>

    <div class="clock" id="clock-face">
        <div class="hand-wrapper" id="hour-wrapper">
            <div class="hour-hand"><div class="arrow"></div><div class="shaft"></div></div>
            <div class="hour-tail"></div>
        </div>
        <div class="hand-wrapper" id="minute-wrapper">
            <div class="minute-hand"><div class="arrow"></div><div class="shaft"></div></div>
            <div class="minute-tail"></div>
        </div>
        <div class="hand-wrapper" id="second-wrapper">
            <div class="second-hand"></div>
            <div class="second-tail"></div>
        </div>
        <div class="center-dot"></div>
    </div>

    <script>
        // --- FULLSCREEN LOGIC ---
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.classList.add('hidden');
            } else {
                fullscreenBtn.classList.remove('hidden');
            }
        });

        // --- CLOCK UI GENERATION ---
        const clockFace = document.getElementById('clock-face');

        for (let i = 0; i < 60; i++) {
            const markerContainer = document.createElement('div');
            markerContainer.className = 'marker-container';
            markerContainer.style.transform = `rotate(${i * 6}deg)`; 

            const marker = document.createElement('div');
            if (i % 5 === 0) { marker.className = 'triangle-marker'; } 
            else { marker.className = 'tick-marker'; }

            markerContainer.appendChild(marker);
            clockFace.prepend(markerContainer); 
        }
        
        const radius = 40; 
        for (let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.className = 'number';
            num.innerText = i;
            
            const angle = (i * 30 - 90) * (Math.PI / 180);
            const x = 50 + radius * Math.cos(angle);
            const y = 50 + radius * Math.sin(angle);
            
            num.style.left = `${x}%`;
            num.style.top = `${y}%`;
            
            clockFace.appendChild(num);
        }

        // --- CLOCK TICKING ---
        const hourWrapper = document.getElementById('hour-wrapper');
        const minuteWrapper = document.getElementById('minute-wrapper');
        const secondWrapper = document.getElementById('second-wrapper');

        function updateClock() {
            const now = new Date();
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            const secondsDegrees = (seconds / 60) * 360;
            const minutesDegrees = ((minutes + seconds / 60) / 60) * 360;
            const hoursDegrees = ((hours % 12 + minutes / 60) / 12) * 360;

            secondWrapper.style.transform = `rotate(${secondsDegrees}deg)`;
            minuteWrapper.style.transform = `rotate(${minutesDegrees}deg)`;
            hourWrapper.style.transform = `rotate(${hoursDegrees}deg)`;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
